<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel Padres — Acceso</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div class="login-page">
    <div class="login-box">
      <div class="login-emoji">🔐</div>
      <h1>Panel de Padres</h1>
      <p>Acceso privado al seguimiento de Dario</p>

      <div class="input-group">
        <label for="password">Contraseña</label>
        <input type="password" id="password" placeholder="Contraseña" autocomplete="current-password">
      </div>

      <div class="login-error" id="login-error">Contraseña incorrecta. Inténtalo de nuevo.</div>

      <button class="btn-primary" id="btn-login">Entrar</button>

      <p style="margin-top:16px;font-size:13px">
        <a href="/" style="color:var(--blue)">← Volver a la app de Dario</a>
      </p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>
  <script>
    const btn   = document.getElementById('btn-login');
    const input = document.getElementById('password');
    const errEl = document.getElementById('login-error');

    async function doLogin() {
      errEl.style.display = 'none';
      btn.disabled        = true;
      btn.textContent     = 'Entrando…';

      const { error } = await sb.auth.signInWithPassword({
        email:    PANEL_EMAIL,
        password: input.value,
      });

      if (!error) {
        window.location.href = '/panel.html';
      } else {
        errEl.style.display = 'block';
        btn.disabled        = false;
        btn.textContent     = 'Entrar';
        input.focus();
        input.select();
      }
    }

    btn.addEventListener('click', doLogin);
    input.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
    input.focus();
  </script>
</body>
</html>
